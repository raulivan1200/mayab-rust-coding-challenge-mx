openapi: 3.0.3
info:
  title: Mayab Arbitraje BTC
  description: >-
    API principal e integraciones del motor simulado de arbitraje BTC. No
    ejecuta órdenes reales ni custodia fondos. La superficie completa de rutas
    y aliases se documenta en API_REFERENCE.md.
  version: 0.1.0
servers:
  - url: http://127.0.0.1:8080
    description: Desarrollo local
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: OK
  /api/estado:
    get:
      summary: Estado público del motor
      responses:
        '200':
          description: OK
  /api/version:
    get:
      summary: Identifica el build y la corrida
      responses:
        '200':
          description: SHA, fecha, versión, ambiente y huella de evidencia
  /api/jurado:
    get:
      summary: Publica la superficie consolidada para jurado
      responses:
        '200':
          description: Rúbrica, checks, cobertura y enlaces
  /api/preflight:
    get:
      summary: Gate exacto 12/12 de operación y evidencia forense
      responses:
        '200':
          description: Checks de jurado, matriz determinista, conciliación runtime y persistencia
  /api/resumen-llm:
    get:
      summary: Resume el estado para agentes y revisores automáticos
      responses:
        '200':
          description: Resumen narrativo, decisión y métricas clave
  /api/mcp/manifest:
    get:
      summary: Catálogo del contrato MCP-lite HTTP/JSON
      description: >-
        MCP-lite es un contrato propio y no implementa el transporte MCP
        estándar. Un cliente MCP estándar necesita un adaptador.
      responses:
        '200':
          description: Metadatos, seguridad, herramientas y ejemplos
  /api/mcp/call:
    post:
      summary: Invoca una herramienta MCP-lite
      description: >-
        Las herramientas de lectura son públicas. En producción, las
        herramientas mutables requieren ADMIN_TOKEN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpCall'
            examples:
              resumen:
                value:
                  tool: summarize_for_llm
                  arguments: {}
              escenario:
                value:
                  tool: demo_scenario
                  arguments:
                    escenario: fill_parcial
      responses:
        '200':
          description: Resultado de la herramienta
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/discord/interactions:
    post:
      summary: Recibe una interacción firmada de Discord
      description: >-
        Verifica la firma Ed25519 sobre timestamp y cuerpo crudo antes de
        deserializar. No usa ADMIN_TOKEN.
      parameters:
        - in: header
          name: X-Signature-Ed25519
          required: true
          schema:
            type: string
        - in: header
          name: X-Signature-Timestamp
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: ACK, respuesta inmediata o respuesta diferida de Discord
        '401':
          description: Firma inválida
        '503':
          description: DISCORD_PUBLIC_KEY no configurada
  /api/demo:
    post:
      summary: Inyecta escenario demo
      security:
        - AdminBearer: []
        - AdminHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                escenario:
                  type: string
                  enum: [fallo_orden, fallo_segunda_pierna, mercado_movido, liquidez_insuficiente, fill_parcial, circuit_breaker, rebalanceo, mercado_rentable]
              required: [escenario]
              additionalProperties: false
      responses:
        '200':
          description: Resultado del escenario inyectado
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/demo/reset:
    post:
      summary: Reinicia el estado simulado sin tumbar los feeds
      description: Requiere token salvo cuando MAYAB_JUDGE_MODE=true, que abre únicamente este recorrido determinista.
      security:
        - AdminBearer: []
        - AdminHeader: []
        - {}
      responses:
        '200':
          description: Simulación reiniciada
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/demo/final:
    post:
      summary: Prepara la corrida auditada completa
      description: Requiere token salvo cuando MAYAB_JUDGE_MODE=true, que abre únicamente este recorrido determinista.
      security:
        - AdminBearer: []
        - AdminHeader: []
        - {}
      responses:
        '200':
          description: GA, escenarios, conciliación, rebalanceo y preflight
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/demo/caos:
    post:
      summary: Ejecuta degradación, protección y recuperación simuladas
      description: Requiere token salvo cuando MAYAB_JUDGE_MODE=true, que abre únicamente este recorrido determinista.
      security:
        - AdminBearer: []
        - AdminHeader: []
        - {}
      responses:
        '200':
          description: Resultado y checks de la prueba de caos
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/ga/estado:
    get:
      summary: Obtiene el estado del Algoritmo Genético
      responses:
        '200':
          description: OK
  /api/ga/sensibilidad:
    get:
      summary: Compara siete configuraciones GA con train y 24 semillas holdout no vistas
      description: Cada configuración se entrena sobre 24 semillas comunes 101..124; después se congela y evalúa una sola vez sobre los 24 holdouts pareados 401..424.
      responses:
        '200':
          description: Metodología y resultados por configuración
  /api/ga/evolucionar:
    post:
      summary: Fuerza la evolución de la población
      security:
        - AdminBearer: []
        - AdminHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GaEvolution'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/ga/config:
    get:
      summary: Obtiene la configuración vigente del GA
      responses:
        '200':
          description: Configuración del GA
    post:
      summary: Actualiza la configuración validada del GA
      security:
        - AdminBearer: []
        - AdminHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Configuración actualizada
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/backtest:
    get:
      summary: Ejecuta el backtest reproducible vigente
      responses:
        '200':
          description: Baseline, campeón GA, holdout e intervalos
  /api/lab/sweep:
    get:
      summary: Compara presets sobre el mismo replay
      responses:
        '200':
          description: Resultados pareados y sensibilidad
  /api/latencias:
    get:
      summary: Publica latencia por exchange y por etapa del pipeline
      responses:
        '200':
          description: EWMA, p50, p95, p99, throughput y coalescing
  /api/research/microstructure:
    get:
      summary: Laboratorio de microestructura, calibración y OU fuera de muestra
      responses:
        '200':
          description: Quote age, asincronía, microprice, OFI, markouts, Platt, isotónica, Wilson y OU
  /api/research/ou:
    get:
      summary: Laboratorio OU independiente con ADF/KPSS y holdout cronológico
      responses:
        '200':
          description: Parámetros OU congelados, estacionariedad, baselines y estabilidad
  /api/research/economics:
    get:
      summary: Expone la economía de la estrategia sobre la evidencia vigente
      responses:
        '200':
          description: Waterfall de edge, frontera break-even, capacidad y embudo de decisión
  /api/research/execution-matrix:
    get:
      summary: Ejecuta la matriz determinista de escenarios de dos piernas
      responses:
        '200':
          description: Invariantes, conciliación y exposición residual por escenario
  /api/research/ledger-audit:
    get:
      summary: Reconcilia el ledger visible de la corrida
      responses:
        '200':
          description: Huella, unicidad, wallets, fills, reservas, PnL y estado terminal
  /api/export/csv:
    get:
      summary: Descarga auditoría CSV
      responses:
        '200':
          description: Archivo CSV
  /api/export/json:
    get:
      summary: Descarga todo el estado JSON
      responses:
        '200':
          description: Archivo JSON
  /api/export/evidence:
    get:
      summary: Descarga el resumen Markdown de evidencia y procedencia
      responses:
        '200':
          description: Archivo Markdown sellable
components:
  securitySchemes:
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque ADMIN_TOKEN
    AdminHeader:
      type: apiKey
      in: header
      name: X-Admin-Token
  schemas:
    McpCall:
      type: object
      required: [tool]
      additionalProperties: false
      properties:
        tool:
          type: string
          enum: [get_state, preflight, jury_mode, summarize_for_llm, evaluation_package, latency_ranking, backtest, research_lab_sweep, prepare_demo_final, evolve_ga, demo_scenario]
        arguments:
          type: object
          additionalProperties: true
    GaEvolution:
      type: object
      additionalProperties: false
      properties:
        usarReplaySiVacio:
          type: boolean
          default: true
        muestras:
          type: integer
          minimum: 12
          maximum: 240
          default: 96
    ApiError:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
  responses:
    BadRequest:
      description: Body o argumentos inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Falta autenticación administrativa
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Token administrativo incorrecto
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
