name: Rust CI and Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_VERSION: "1.96.0"

jobs:
  ci:
    name: Format, test and release build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component rustfmt,clippy
          rustup default "$RUST_VERSION"

      # Cache only immutable downloads. Restoring target/ across commits can
      # hide stale build artifacts; release candidates must compile cleanly.
      - name: Cache Cargo downloads
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-downloads-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-downloads-v2-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Security audit
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          allow-duplicates: true

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Test isolated sandbox executor
        run: |
          cargo test --workspace --all-targets --locked --features testnet-execution
          ./scripts/check-testnet-safety.sh

      - name: Test durable persistence feature
        run: cargo test -p mayab-arbitrage --all-targets --locked --features timescaledb

      - name: Check production binary with durable persistence
        run: cargo check -p mayab-cli --bin mayab-arbitrage --locked --features timescaledb

      - name: Build release binary
        run: cargo build --workspace --all-targets --release --locked

      - name: Set up Node for dashboard checks
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Validate all dashboard JavaScript
        run: |
          find internal/webui/web -name '*.js' -type f -print0 \
            | sort -z \
            | xargs -0 -n1 node --check

      - name: Install browser test dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run dashboard end-to-end tests
        run: npm run test:e2e -- --reporter=line

      - name: Smoke release binary
        env:
          AUDITORIA_DB_PATH: "${{ runner.temp }}/mayab-ci.sqlite"
          DEMO_RENTABLE_INICIAL: "true"
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN || 'ci-smoke-token' }}
        run: |
          PORT=8080 \
          RUST_LOG=error \
          target/release/mayab-arbitrage > "$RUNNER_TEMP/mayab-smoke.log" 2>&1 &
          app_pid=$!
          trap 'kill "$app_pid" 2>/dev/null || true; tail -200 "$RUNNER_TEMP/mayab-smoke.log" || true' EXIT
          sleep 1
          if ! kill -0 "$app_pid" 2>/dev/null; then
            echo "App murió al iniciar" >&2
            tail -200 "$RUNNER_TEMP/mayab-smoke.log" || true
            exit 1
          fi
          for _ in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          # Check readiness endpoint
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/readyz | grep -q '"ready":true'; then
              break
            fi
            sleep 1
          done
          ./scripts/smoke-demo.sh

  container:
    name: Build and test production container
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Build one provenance-stable candidate image
        shell: bash
        env:
          MAYAB_RELEASE_VERSION: ${{ vars.MAYAB_RELEASE_VERSION }}
        run: |
          set -euo pipefail
          build_time="$(git show -s --format=%cI "$GITHUB_SHA")"
          release_version="${MAYAB_RELEASE_VERSION:-$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)}"
          test -n "$build_time"
          test -n "$release_version"
          docker build --pull --no-cache --tag mayab-btc-arbitrage:ci \
            --build-arg MAYAB_GIT_SHA="$GITHUB_SHA" \
            --build-arg MAYAB_BUILD_TIME="$build_time" \
            --build-arg MAYAB_RELEASE_VERSION="$release_version" \
            --build-arg MAYAB_BUILD_ENV=production .

      - name: Verify non-root runtime metadata
        run: |
          test "$(docker image inspect mayab-btc-arbitrage:ci --format '{{.Config.User}}')" = "nonroot:nonroot"
          test "$(docker image inspect mayab-btc-arbitrage:ci --format '{{.Config.Entrypoint}}')" = "[/app/mayab-arbitrage]"
          test "$(docker image inspect mayab-btc-arbitrage:ci --format '{{.Config.WorkingDir}}')" = "/app"

      - name: Start container with a read-only root filesystem
        shell: bash
        run: |
          set -euo pipefail
          cid=$(docker run --detach \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --tmpfs /data:rw,nosuid,size=64m,uid=10001,gid=10001,mode=0700 \
            mayab-btc-arbitrage:ci)
          trap 'docker logs "$cid" || true; docker rm --force "$cid" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            status=$(docker inspect "$cid" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}')
            if [[ "$status" == healthy ]]; then
              exit 0
            fi
            if [[ "$(docker inspect "$cid" --format '{{.State.Running}}')" != true ]]; then
              echo "container stopped before becoming healthy" >&2
              exit 1
            fi
            sleep 1
          done
          echo "container did not become healthy" >&2
          exit 1

      - name: Export the exact tested image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          image_id="$(docker image inspect mayab-btc-arbitrage:ci --format '{{.Id}}')"
          printf '%s\n' "$image_id" > "$RUNNER_TEMP/mayab-production-image.id"
          docker save --output "$RUNNER_TEMP/mayab-production-image.tar" mayab-btc-arbitrage:ci
          gzip -1 "$RUNNER_TEMP/mayab-production-image.tar"

      - name: Upload the exact tested image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: mayab-production-image-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/mayab-production-image.tar.gz
            ${{ runner.temp }}/mayab-production-image.id
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

  deploy:
    name: Deploy Cloud Run
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.GCP_PROJECT_ID != '' &&
      vars.WIF_PROVIDER != '' &&
      vars.WIF_SERVICE_ACCOUNT != '' &&
      vars.GAR_REPOSITORY != '' &&
      vars.RUNTIME_SERVICE_ACCOUNT != '' &&
      vars.ADMIN_TOKEN_SECRET != ''
    needs: [ci, container]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: mayab-cloud-run-production
      cancel-in-progress: false
    env:
      PROJECT: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'mayab-btc-arbitrage' }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      RUNTIME_SERVICE_ACCOUNT: ${{ vars.RUNTIME_SERVICE_ACCOUNT }}
      MIN_INSTANCES: "1"
      MAX_INSTANCES: "1"
      ADMIN_TOKEN_SECRET: ${{ vars.ADMIN_TOKEN_SECRET }}
      DATABASE_URL_SECRET: ${{ vars.DATABASE_URL_SECRET }}
      # La demo pública puede operar explícitamente con SQLite efímero. Si se
      # configura DATABASE_URL_SECRET, el script selecciona TimescaleDB y esta
      # excepción deja de afectar el perfil de persistencia.
      ALLOW_EPHEMERAL_PRODUCTION: ${{ vars.DATABASE_URL_SECRET == '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Download the exact image tested by CI
        uses: actions/download-artifact@v8
        with:
          name: mayab-production-image-${{ github.run_id }}
          path: ${{ runner.temp }}/mayab-production-image

      - name: Publish the tested image and resolve its immutable digest
        id: image
        shell: bash
        run: |
          set -euo pipefail
          registry="${REGION}-docker.pkg.dev"
          image="${registry}/${PROJECT}/${GAR_REPOSITORY}/${SERVICE}:${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_id="$(tr -d '\r\n' < "$RUNNER_TEMP/mayab-production-image/mayab-production-image.id")"
          gunzip -c "$RUNNER_TEMP/mayab-production-image/mayab-production-image.tar.gz" | docker load
          actual_id="$(docker image inspect mayab-btc-arbitrage:ci --format '{{.Id}}')"
          test -n "$expected_id"
          test "$actual_id" = "$expected_id"
          gcloud auth configure-docker "$registry" --quiet
          docker tag mayab-btc-arbitrage:ci "$image"
          docker push "$image"
          digest="$(docker buildx imagetools inspect "$image" | awk '$1 == "Digest:" && digest == "" { digest = $2 } END { print digest }')"
          printf '%s\n' "$digest" | grep -Eq '^sha256:[0-9a-f]{64}$'
          immutable="${image%:*}@${digest}"
          docker pull "$immutable"
          remote_id="$(docker image inspect "$immutable" --format '{{.Id}}')"
          test "$remote_id" = "$expected_id"
          echo "uri=$immutable" >> "$GITHUB_OUTPUT"

      - name: Deploy candidate, smoke it off-traffic and promote atomically
        env:
          IMAGE: ${{ steps.image.outputs.uri }}
        run: ./scripts/deploy-cloud-run.sh
