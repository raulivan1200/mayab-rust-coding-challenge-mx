name: Rust CI and Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_VERSION: "1.96.0"

jobs:
  ci:
    name: Format, test and release build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component rustfmt,clippy
          rustup default "$RUST_VERSION"

      # Cache only immutable downloads. Restoring target/ across commits can
      # hide stale build artifacts; release candidates must compile cleanly.
      - name: Cache Cargo downloads
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-downloads-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-downloads-v2-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Security audit
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories
          allow-duplicates: true

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Test isolated sandbox executor
        run: |
          cargo test --workspace --all-targets --locked --features testnet-execution
          ./scripts/check-testnet-safety.sh

      - name: Check durable persistence build
        run: cargo check -p mayab-cli --bin mayab-arbitrage --locked --features timescaledb

      - name: Build release binary
        run: cargo build --workspace --all-targets --release --locked

      - name: Set up Node for dashboard checks
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Validate all dashboard JavaScript
        run: |
          find internal/webui/web -name '*.js' -type f -print0 \
            | sort -z \
            | xargs -0 -n1 node --check

      - name: Install browser test dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run dashboard end-to-end tests
        run: npm run test:e2e -- --reporter=line

      - name: Smoke release binary
        env:
          AUDITORIA_DB_PATH: "${{ runner.temp }}/mayab-ci.sqlite"
          DEMO_RENTABLE_INICIAL: "true"
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN || 'ci-smoke-token' }}
        run: |
          PORT=8080 \
          RUST_LOG=error \
          target/release/mayab-arbitrage > "$RUNNER_TEMP/mayab-smoke.log" 2>&1 &
          app_pid=$!
          trap 'kill "$app_pid" 2>/dev/null || true; tail -200 "$RUNNER_TEMP/mayab-smoke.log" || true' EXIT
          sleep 1
          if ! kill -0 "$app_pid" 2>/dev/null; then
            echo "App murió al iniciar" >&2
            tail -200 "$RUNNER_TEMP/mayab-smoke.log" || true
            exit 1
          fi
          for _ in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          # Check readiness endpoint
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/readyz | grep -q '"ready":true'; then
              break
            fi
            sleep 1
          done
          ./scripts/smoke-demo.sh

  container:
    name: Build production container
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Build multi-stage image
        run: |
          docker build --pull --no-cache --tag mayab-btc-arbitrage:ci \
            --build-arg MAYAB_GIT_SHA="$GITHUB_SHA" \
            --build-arg MAYAB_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" .

      - name: Verify non-root runtime metadata
        run: |
          test "$(docker image inspect mayab-btc-arbitrage:ci --format '{{.Config.User}}')" = "nonroot:nonroot"
          test "$(docker image inspect mayab-btc-arbitrage:ci --format '{{.Config.Entrypoint}}')" = "[/app/mayab-arbitrage]"

  deploy:
    name: Deploy Cloud Run
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      vars.GCP_PROJECT_ID != '' &&
      vars.WIF_PROVIDER != '' &&
      vars.WIF_SERVICE_ACCOUNT != '' &&
      vars.GAR_REPOSITORY != ''
    needs: [ci, container]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: mayab-cloud-run-production
      cancel-in-progress: false
    env:
      PROJECT: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'mayab-btc-arbitrage' }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      MIN_INSTANCES: "1"
      MAX_INSTANCES: "1"
      ADMIN_TOKEN_SECRET: ${{ vars.ADMIN_TOKEN_SECRET }}
      DATABASE_URL_SECRET: ${{ vars.DATABASE_URL_SECRET }}
    steps:
      - uses: actions/checkout@v7

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Build and publish immutable image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          registry="${REGION}-docker.pkg.dev"
          image="${registry}/${PROJECT}/${GAR_REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          gcloud auth configure-docker "$registry" --quiet
          docker build --pull --no-cache --tag "$image" \
            --build-arg MAYAB_GIT_SHA="$GITHUB_SHA" \
            --build-arg MAYAB_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg MAYAB_RELEASE_VERSION="1.0.0-final" \
            --build-arg MAYAB_BUILD_ENV=production .
          docker push "$image"
          echo "uri=$image" >> "$GITHUB_OUTPUT"

      - name: Deploy one warm production instance
        env:
          IMAGE: ${{ steps.image.outputs.uri }}
        run: ./scripts/deploy-cloud-run.sh

      - name: Resolve public URL
        id: service
        shell: bash
        run: |
          set -euo pipefail
          url=$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT" \
            --region "$REGION" \
            --format='value(status.url)')
          test -n "$url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Public smoke test - healthz
        env:
          BASE_URL: ${{ steps.service.outputs.url }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -fsS "${BASE_URL}/healthz" | grep -q '"ok":true' \
              && curl -fsS "${BASE_URL}/api/healthz" | grep -q '"ok":true'; then
              echo "healthz canonical and compatibility alias OK"
              exit 0
            fi
            sleep 2
          done
          echo "healthz failed" >&2
          exit 1

      - name: Public smoke test - readyz
        env:
          BASE_URL: ${{ steps.service.outputs.url }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            if curl -fsS "${BASE_URL}/readyz" | grep -q '"ready":true'; then
              echo "readyz OK"
              exit 0
            fi
            sleep 2
          done
          echo "readyz failed" >&2
          curl -fsS "${BASE_URL}/readyz" || true
          exit 1

      - name: Public smoke test - full demo
        env:
          BASE_URL: ${{ steps.service.outputs.url }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: ./scripts/smoke-demo.sh

      - name: Leave jury demo ready
        if: always() && steps.service.outputs.url != ''
        env:
          BASE_URL: ${{ steps.service.outputs.url }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$ADMIN_TOKEN"
          curl -fsS -X POST "$BASE_URL/api/demo/final" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -d '{}' >/dev/null
          preflight="$(curl -fsS "$BASE_URL/api/preflight")"
          jq -e '
            .listo == true and
            .judgeReadiness.status == "ready" and
            (.judgeReadiness.checks | length >= 12) and
            all(.judgeReadiness.checks[]; .ok == true)
          ' <<<"$preflight" >/dev/null
          echo "public jury state ready"
