name: Rust CI and Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_VERSION: "1.96.0"

jobs:
  ci:
    name: Format, test and release build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component rustfmt
          rustup default "$RUST_VERSION"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Security audit
        run: cargo install cargo-audit && cargo audit

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

      - name: Build release binary
        run: cargo build --workspace --all-targets --release --locked

      - name: Validate dashboard JavaScript
        run: node --check internal/webui/web/app.js

      - name: Smoke release binary
        run: |
          PORT=8080 \
          RUST_LOG=error \
          AUDITORIA_DB_PATH="${RUNNER_TEMP}/mayab-ci.sqlite" \
          target/release/mayab-arbitrage &
          app_pid=$!
          trap 'kill "$app_pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          ./scripts/smoke-demo.sh

  container:
    name: Build production container
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build multi-stage image
        run: docker build --tag mayab-btc-arbitrage:ci .

      - name: Verify non-root runtime metadata
        run: |
          test "$(docker image inspect mayab-btc-arbitrage:ci --format '{{.Config.User}}')" = "nonroot:nonroot"
          test "$(docker image inspect mayab-btc-arbitrage:ci --format '{{.Config.Entrypoint}}')" = "[/app/mayab-arbitrage]"

  deploy:
    name: Deploy Cloud Run
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      vars.GCP_PROJECT_ID != '' &&
      vars.WIF_PROVIDER != '' &&
      vars.WIF_SERVICE_ACCOUNT != '' &&
      vars.GAR_REPOSITORY != ''
    needs: [ci, container]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: mayab-cloud-run-production
      cancel-in-progress: false
    env:
      PROJECT: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'mayab-btc-arbitrage' }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      MIN_INSTANCES: "1"
      MAX_INSTANCES: "1"
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Build and publish immutable image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          registry="${REGION}-docker.pkg.dev"
          image="${registry}/${PROJECT}/${GAR_REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          gcloud auth configure-docker "$registry" --quiet
          docker build --tag "$image" .
          docker push "$image"
          echo "uri=$image" >> "$GITHUB_OUTPUT"

      - name: Deploy one warm production instance
        env:
          IMAGE: ${{ steps.image.outputs.uri }}
        run: ./scripts/deploy-cloud-run.sh

      - name: Resolve public URL
        id: service
        shell: bash
        run: |
          set -euo pipefail
          url=$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT" \
            --region "$REGION" \
            --format='value(status.url)')
          test -n "$url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Public smoke
        env:
          BASE_URL: ${{ steps.service.outputs.url }}
        run: ./scripts/smoke-demo.sh

      - name: Leave jury demo ready
        if: always() && steps.service.outputs.url != ''
        env:
          BASE_URL: ${{ steps.service.outputs.url }}
        run: |
          curl -fsS -X POST "$BASE_URL/api/demo/final" \
            -H 'Content-Type: application/json' \
            -d '{}' >/dev/null
