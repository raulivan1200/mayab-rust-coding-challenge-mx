name: Benchmarks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  criterion:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Compile and run hot-path benchmarks
        run: cargo bench -p mayab-arbitrage --bench motor_benchmark --locked -- --noplot
      - name: Upload Criterion report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-report
          path: target/criterion
          if-no-files-found: error
          retention-days: 14
