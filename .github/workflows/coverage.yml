name: Coverage

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  llvm-cov:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Generate LCOV report
        run: cargo llvm-cov --workspace --all-targets --locked --fail-under-lines 65 --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v7
        with:
          name: rust-lcov
          path: lcov.info
          if-no-files-found: error
      # Codecov is a mirror, not the coverage gate. The local threshold and
      # uploaded LCOV artifact above remain authoritative if Codecov is down.
      - name: Publish coverage when Codecov is configured
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ env.CODECOV_TOKEN }}
      - name: Record local-only coverage publication
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: echo "LCOV verified and uploaded as the rust-lcov workflow artifact; Codecov token is not configured."
