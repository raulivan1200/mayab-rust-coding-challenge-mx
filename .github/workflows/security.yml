name: Security

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Gitleaks scans the commit range GitHub supplies for push/PR events.
      # A shallow checkout can omit the parent commit and make the scan fail
      # with "unknown revision" before inspecting any files.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
      - name: Reject committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
