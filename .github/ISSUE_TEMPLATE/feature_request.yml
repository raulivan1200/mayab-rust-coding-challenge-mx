name: Feature request
description: Propose an auditable improvement that preserves the paper-only safety boundary.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, operator, or evaluator problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe API/UI effects, evidence, and tests.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and trade-offs
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This proposal keeps execution simulated and introduces no secrets, custody, or on-chain transfers.
          required: true
